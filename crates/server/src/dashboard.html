<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PRISM Node</title>
  <style>
    :root { --bg: #0d1117; --fg: #e6edf3; --accent: #fab283; --dim: #8b949e; --card: #161b22; --border: #30363d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 4rem 2rem; }
    .logo { font-size: 2.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; }
    .subtitle { color: var(--dim); margin-bottom: 3rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; max-width: 480px; width: 100%; }
    .card h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 1rem; }
    .status-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .status-row:last-child { border-bottom: none; }
    .status-name { color: var(--fg); }
    .status-value { color: var(--dim); font-family: 'SF Mono', Monaco, monospace; font-size: 0.9rem; }
    .healthy { color: #7fd88f; }
    .starting { color: var(--accent); }
    .footer { margin-top: 3rem; color: var(--dim); font-size: 0.85rem; }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">PRISM</div>
  <div class="subtitle">materials research node</div>
  <div class="card" id="info">
    <h2>Node Status</h2>
    <div id="services">Loading...</div>
  </div>
  <div class="footer">
    <a href="https://marc27.com">MARC27</a> &middot; <a href="/api/v1/node">API</a>
  </div>
  <script>
    async function refresh() {
      try {
        const r = await fetch('/api/v1/node');
        const d = await r.json();
        const container = document.getElementById('services');
        container.textContent = '';

        function addRow(name, value, cls) {
          const row = document.createElement('div');
          row.className = 'status-row';
          const nameSpan = document.createElement('span');
          nameSpan.className = 'status-name';
          nameSpan.textContent = name;
          const valSpan = document.createElement('span');
          valSpan.className = 'status-value' + (cls ? ' ' + cls : '');
          valSpan.textContent = value;
          row.appendChild(nameSpan);
          row.appendChild(valSpan);
          container.appendChild(row);
        }

        addRow('Node', d.name);
        addRow('Version', d.version);
        addRow('Uptime', d.uptime_secs + 's');
        for (const s of d.services) {
          addRow(s.name, ':' + s.port + ' ' + s.status, s.status);
        }
      } catch(e) {
        document.getElementById('services').textContent = 'Error: ' + e.message;
      }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
