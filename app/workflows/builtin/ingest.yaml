kind: skill_workflow
name: ingest
description: >
  Ingest data from a source into the MARC27 Knowledge Plane.
  The workflow searches the web, reads content, extracts entities
  with the LLM, and stores everything with provenance.
version: "1.1.0"
author: MARC27

inputs:
  - name: source
    type: string
    description: URL, search query, or file path to ingest
    required: true
  - name: mode
    type: string
    description: "What to extract: graph (entities), embed (vectors), full (both)"
    default: "full"
  - name: corpus
    type: string
    description: Corpus UUID to associate with (for embeddings)
    required: false

steps:
  - name: discover
    skill: web
    description: Search the web for the source to find related URLs and context.
    inputs:
      action: search
      query: "$source"
      limit: 5
    outputs:
      results: "$search_results"
      count: "$search_count"

  - name: fetch
    skill: web
    description: Read the source URL and get clean text content
    inputs:
      action: read
      url: "$source"
    outputs:
      content: "$content"
      title: "$title"

  - name: extract
    skill: llm_extract
    description: >
      Extract structured entities and relationships from the fetched
      content. Entity types: MAT, PRO, ELM, DSC, SMT, CMT, APL, PUB,
      AUT, TOP, CMF. Each entity is {name, entity_type, label,
      properties?}; each relationship is {from_name, to_name, rel_type,
      properties?}.
    inputs:
      text: "$content"
      title: "$title"
    outputs:
      entities: "$entities"
      relationships: "$relationships"

  - name: store_graph
    skill: knowledge_write
    description: Store extracted entities and relationships in the knowledge graph
    approve: true
    inputs:
      action: graph_ingest
      entities: "$entities"
      relationships: "$relationships"
    outputs:
      entities_created: "$entities_created"
      relationships_created: "$relationships_created"

  - name: store_embeddings
    skill: knowledge_write
    description: Embed the source text for semantic search
    approve: true
    inputs:
      action: embed
      doc_id: "$source"
      content: "$content"
      corpus_id: "$corpus"
    outputs:
      embedding_id: "$embedding_id"

  - name: record_provenance
    skill: provenance
    description: Record where this data came from in the local provenance store
    inputs:
      entities: "$entities"
      source_url: "$source"
      title: "$title"
      pipeline: ["web.search", "web.read", "llm_extract", "knowledge_write.graph_ingest", "knowledge_write.embed"]
      confidence: 0.85
    outputs:
      record_id: "$provenance_record_id"

on_fail: stabilize
