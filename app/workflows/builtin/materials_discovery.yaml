kind: skill_workflow
name: materials_discovery
description: >
  End-to-end materials discovery workflow. Searches federated materials
  databases for materials matching structured criteria, identifies property
  gaps, fills the highest-priority gap with an ML prediction, exports the
  results, ingests them into the knowledge graph, and performs domain
  analysis. Every step executes deterministically through the workflow
  engine — tool steps run real tools on the local node, llm_* steps run
  real LLM calls with JSON output contracts.
version: "1.1.0"
author: MARC27

inputs:
  - name: query
    type: string
    description: >
      Natural language description of what to find. Used by the analysis
      and reporting steps. Examples: "titanium alloys with band gap > 1.5 eV",
      "high-entropy alloys with low formation energy".
    required: true
  - name: elements
    type: list
    description: Elements to include (e.g. [Ti, Al, V] or "Ti,Al,V")
    required: false
  - name: formula
    type: string
    description: Chemical formula filter for the database search (optional)
    required: false
  - name: target_properties
    type: list
    description: >
      Properties to ensure are filled. Examples: [band_gap,
      formation_energy, bulk_modulus]
    default: [band_gap, formation_energy]
  - name: limit
    type: integer
    description: Maximum number of materials to retrieve
    default: 20
  - name: fill_method
    type: string
    description: "How to fill gaps: predict (ML), lookup (API), or both"
    default: "both"

steps:
  - name: search
    skill: materials_search
    description: >
      Search the federated materials databases (Materials Project, OPTIMADE
      consortium members, user-installed providers) using the structured
      filters. Returns deduplicated unified Material records with
      per-property provider provenance.
    inputs:
      elements: "$elements"
      formula: "$formula"
      limit: "$limit"
    outputs:
      materials: "$materials"
      count: "$count"

  - name: identify_gaps
    skill: llm_analyze
    description: >
      Examine the search results table and identify which target_properties
      are missing for each material. Return `gaps` as a list of
      {formula, property} pairs that need to be filled, and `gap_count`
      as the number of gaps.
    inputs:
      materials: "$materials"
      target_properties: "$target_properties"
    outputs:
      gaps: "$gaps"
      gap_count: "$gap_count"

  - name: plan_fill
    skill: llm_analyze
    description: >
      From the list of gaps, choose the SINGLE highest-value gap to fill
      with an ML prediction (prefer well-formed formulas and properties a
      composition model can predict, such as band_gap or formation_energy).
      Return `fill_formula` (the chemical formula) and `fill_property`
      (the property name to predict).
    inputs:
      gaps: "$gaps"
      fill_method: "$fill_method"
    outputs:
      fill_formula: "$fill_formula"
      fill_property: "$fill_property"

  - name: fill_gaps
    skill: predict
    description: >
      Predict the selected property for the selected formula with the
      local ML predictor. Prediction confidence is medium (model-based);
      looked-up values are high confidence.
    inputs:
      target: formula
      formula: "$fill_formula"
      property_name: "$fill_property"
    outputs:
      prediction: "$fill_result"

  - name: present_results
    skill: dataset
    description: Export the search results table to CSV.
    approve: true
    inputs:
      action: export
      results: "$materials"
    outputs:
      filename: "$csv_path"

  - name: graph_payload
    skill: llm_analyze
    description: >
      Convert the materials into a knowledge-graph payload. Return
      `entities` as a list of {name, entity_type, label, properties?}
      (entity_type MAT for materials, ELM for elements, PRO for
      properties) and `relationships` as a list of {from_name, to_name,
      rel_type, properties?} linking materials to their elements and
      properties. Include the fill prediction with its confidence.
    inputs:
      materials: "$materials"
      fill_result: "$fill_result"
    outputs:
      entities: "$entities"
      relationships: "$relationships"

  - name: ingest_knowledge
    skill: knowledge_write
    description: Ingest the discovered materials into the knowledge graph.
    approve: true
    inputs:
      action: graph_ingest
      entities: "$entities"
      relationships: "$relationships"
    outputs:
      entities_created: "$entities_created"

  - name: create_dataset
    skill: dataset
    description: Save the exported CSV as a named PRISM dataset for future analysis.
    approve: true
    inputs:
      action: import
      file_path: "$csv_path"
      dataset_name: "discovery-$query"
    outputs:
      dataset_name: "$dataset_id"

  - name: domain_analysis
    skill: llm_analyze
    description: >
      As a materials scientist, analyze the results: identify trends and
      patterns in the data, and suggest promising compositions for further
      investigation. Return `analysis` (a structured summary of trends)
      and `recommendations` (a list of next steps). Adapt the analysis to
      the user's domain (alloys, ceramics, polymers, ...).
    inputs:
      materials: "$materials"
      fill_result: "$fill_result"
      query: "$query"
    outputs:
      analysis: "$analysis"
      recommendations: "$recommendations"

  - name: report
    skill: llm_report
    description: >
      Generate a structured report summarizing: search parameters and
      result count, property gaps found and how the selected gap was
      filled, key findings from the domain analysis, recommendations for
      next steps, and the created dataset and knowledge-graph entities.
    inputs:
      query: "$query"
      count: "$count"
      gaps: "$gaps"
      fill_result: "$fill_result"
      analysis: "$analysis"
      recommendations: "$recommendations"
      dataset_id: "$dataset_id"
      entities_created: "$entities_created"

on_fail: stabilize
