name: Issue Fix Dispatch

# Triggers when an issue gets the "needs-fix" label.
# Comments on the issue to acknowledge, then the local issue-agent.sh
# picks it up (via --watch mode or manual run).

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to fix"
        required: true

permissions:
  issues: write

jobs:
  dispatch-fix:
    name: Dispatch Fix
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'needs-fix')
    timeout-minutes: 1

    steps:
      - name: Acknowledge fix dispatch
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body \
            "_Fix agent dispatched. A maintainer's local Claude Code agent will analyze and submit a PR._"

      - name: Log for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          ISSUE_NUM: ${{ github.event.inputs.issue_number }}
        run: |
          echo "Manual fix dispatch for issue #${ISSUE_NUM}"
          echo "Run locally: ./scripts/issue-agent.sh --issue ${ISSUE_NUM}"
