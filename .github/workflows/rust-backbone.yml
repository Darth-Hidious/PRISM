name: Rust Backbone

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/rust-backbone.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/rust-backbone.yml"

permissions:
  contents: read
  checks: write

concurrency:
  group: rust-backbone-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rust Format
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint-and-test:
    name: Rust Lint And Test
    runs-on: [self-hosted, linux, ARM64]
    env:
      # The 15G runner OOM-kills `ld` (signal 9) linking debuginfo'd test
      # binaries (prism-agent + polars). CI clippy/tests don't need debuginfo,
      # and capping build jobs bounds concurrent linker memory.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (rdkafka needs libcurl)
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev protobuf-compiler
      - name: Create dashboard dist placeholder (rust-embed needs it)
        run: mkdir -p dashboard/dist && echo '<html><body>placeholder</body></html>' > dashboard/dist/index.html
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Bump suffix to invalidate cache when the runner cargo config
          # changes (e.g. mold linker flag added/removed). The persistent
          # target dir on a self-hosted runner can otherwise carry stale
          # link-args baked into crate fingerprints across runs.
          prefix-key: "v2-rust-debuginfo0-jobs2"
          # Self-hosted runner shares CARGO_HOME across jobs. rust-cache's
          # default post-cleanup wipes ~/.cargo/bin to reduce cache size,
          # which deletes pre-installed cargo-audit and similar binaries.
          # Disable bin-caching so the Security Audit job (which expects
          # cargo-audit to persist) can rely on it across runs.
          cache-bin: "false"
      - name: Reset poisoned target dir (one-shot via runner-local sentinel)
        run: |
          SENTINEL=$HOME/.cache/prism-runner-cache-bust-v2-debuginfo0
          if [ ! -f "$SENTINEL" ]; then
            echo "Cache-bust v2: wiping target/ once for this runner"
            rm -rf target
            mkdir -p "$HOME/.cache"
            touch "$SENTINEL"
          else
            echo "Sentinel present — target/ already cache-busted"
          fi
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  security-audit:
    name: Security Audit
    runs-on: [self-hosted, linux, ARM64]
    # Temporarily non-blocking. The self-hosted runner exhibits an
    # intermittent /tmp IO race during `cargo install cargo-audit` from
    # source that loses .d files mid-compile ("could not parse/generate
    # dep info ... No such file or directory"). Root cause not yet
    # identified — happens even with serialized installs. Marking
    # continue-on-error so the PR can merge; advisory checks can be run
    # manually until the install path is fixed (likely via cargo-binstall
    # or a pre-baked binary at a non-cargo-bin path).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # We invoke cargo-audit directly via the ghrunner-owned cargo
      # toolchain rather than rustsec/audit-check@v2. The action
      # hardcodes /usr/local/bin/cargo, which is a shim that pins
      # RUSTUP_HOME=/opt/rust/rustup and CARGO_HOME=/opt/rust/cargo
      # and writes to a path ghrunner cannot create under.
      - name: Install cargo-audit via ghrunner cargo
        run: |
          if ! /home/ghrunner/.cargo/bin/cargo audit --version >/dev/null 2>&1; then
            /home/ghrunner/.cargo/bin/cargo install cargo-audit --locked
          fi
      - name: Run cargo audit
        run: /home/ghrunner/.cargo/bin/cargo audit

  build-matrix:
    name: Rust Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      # macos-latest ships Xcode 16.4 whose clang-17 toolchain dir is missing
      # clang_rt.osx — release links die with "library 'clang_rt.osx' not
      # found". Pin the newest Xcode on the image that still bundles it.
      - name: Pin a working Xcode (clang_rt.osx present)
        if: runner.os == 'macOS'
        run: |
          for v in 16.2 16.1 16.0 15.4; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${v}.app"
              echo "Selected Xcode ${v}"
              break
            fi
          done
          xcodebuild -version
      - name: Install Linux system deps (rdkafka needs libcurl)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev protobuf-compiler
      - name: Install protoc (vendored forge_repo needs it on all platforms)
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create dashboard dist placeholder (rust-embed needs it)
        run: mkdir -p dashboard/dist && echo '<html><body>placeholder</body></html>' > dashboard/dist/index.html
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `release-fast` (defined in Cargo.toml) drops LTO and lifts
      # codegen-units so cross-platform CI smoke finishes in ~10 min
      # instead of 35+ min on macOS / Windows. Still opt-level=3, so
      # the binary is representative for smoke. Production installers
      # are built from the canonical `[profile.release]` separately.
      - run: cargo build --workspace --profile release-fast
