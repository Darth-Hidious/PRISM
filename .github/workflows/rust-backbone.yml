name: Rust Backbone

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/rust-backbone.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/rust-backbone.yml"

permissions:
  contents: read
  checks: write

concurrency:
  group: rust-backbone-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rust Format
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint-and-test:
    name: Rust Lint And Test
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (rdkafka needs libcurl)
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev protobuf-compiler
      - name: Create dashboard dist placeholder (rust-embed needs it)
        run: mkdir -p dashboard/dist && echo '<html><body>placeholder</body></html>' > dashboard/dist/index.html
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Bump suffix to invalidate cache when the runner cargo config
          # changes (e.g. mold linker flag added/removed). The persistent
          # target dir on a self-hosted runner can otherwise carry stale
          # link-args baked into crate fingerprints across runs.
          prefix-key: "v1-rust-linker-fallback-no-mold"
      - name: Reset poisoned target dir (one-shot via runner-local sentinel)
        run: |
          SENTINEL=$HOME/.cache/prism-runner-cache-bust-v1-no-mold
          if [ ! -f "$SENTINEL" ]; then
            echo "Cache-bust v1: wiping target/ once for this runner"
            rm -rf target
            mkdir -p "$HOME/.cache"
            touch "$SENTINEL"
          else
            echo "Sentinel present — target/ already cache-busted"
          fi
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  security-audit:
    name: Security Audit
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v4
      # We invoke cargo-audit directly via the ghrunner-owned cargo
      # toolchain rather than rustsec/audit-check@v2. The action
      # hardcodes /usr/local/bin/cargo, which is a shim that pins
      # RUSTUP_HOME=/opt/rust/rustup and CARGO_HOME=/opt/rust/cargo
      # and writes to a path ghrunner cannot create under.
      - name: Install cargo-audit via ghrunner cargo
        run: |
          if ! /home/ghrunner/.cargo/bin/cargo audit --version >/dev/null 2>&1; then
            /home/ghrunner/.cargo/bin/cargo install cargo-audit --locked
          fi
      - name: Run cargo audit
        run: /home/ghrunner/.cargo/bin/cargo audit

  build-matrix:
    name: Rust Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps (rdkafka needs libcurl)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev protobuf-compiler
      - name: Install protoc (vendored forge_repo needs it on all platforms)
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create dashboard dist placeholder (rust-embed needs it)
        run: mkdir -p dashboard/dist && echo '<html><body>placeholder</body></html>' > dashboard/dist/index.html
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `release-fast` (defined in Cargo.toml) drops LTO and lifts
      # codegen-units so cross-platform CI smoke finishes in ~10 min
      # instead of 35+ min on macOS / Windows. Still opt-level=3, so
      # the binary is representative for smoke. Production installers
      # are built from the canonical `[profile.release]` separately.
      - run: cargo build --workspace --profile release-fast
