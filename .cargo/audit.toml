# cargo-audit ignore list. We don't suppress these forever — they get
# reviewed every dep bump and either fixed or re-justified. Each entry
# documents WHY we're carrying the risk.

[advisories]
ignore = [
    # hickory-proto 0.x DoS via name-compression linear scan. We don't
    # serve untrusted DNS in any user-facing path; the dep is transitive
    # via gix (forge_repo). Bumping requires gix major; tracked in
    # PRISM/issues for next dep refresh.
    "RUSTSEC-2026-0119",
]
